<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col">
<!-- TopAppBar (Transactional - Shell Suppression Applied) -->
<header class="bg-[#FCF9F1] dark:bg-[#1C1917] font-serif text-lg tracking-tight border-stone-200/60 dark:border-stone-800/60 shadow-[0_2px_15px_-3px_rgba(62,39,35,0.07)] dark:shadow-none docked full-width top-0 border-b">
<div class="flex items-center justify-between px-5 h-16 w-full max-w-screen-md mx-auto">
<div class="flex items-center gap-4">
<button class="text-[#3E2723] dark:text-[#E7E5E4] hover:bg-stone-100/50 dark:hover:bg-stone-800/50 transition-colors p-2 rounded-full">
<span class="material-symbols-outlined">arrow_back</span>
</button>
</div>
<h1 class="font-serif italic font-medium text-[#3E2723] dark:text-[#F5F5F4]">The Coffee Ritual</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</div>
</header>
<main class="flex-grow flex items-center justify-center px-margin-mobile py-xl bg-hero-texture" data-alt="Close-up of steam rising from a ceramic coffee cup in a sunlit, minimalist boutique cafe setting with warm wood textures">
<div class="w-full max-w-md bg-surface/90 backdrop-blur-md p-lg rounded-xl shadow-[0_4px_30px_rgba(62,39,35,0.05)] border border-outline-variant/30">

<div class="text-center mb-xl">
<h2 class="font-headline-lg text-headline-lg text-primary mb-xs">Welcome Back</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Your morning ritual awaits.</p>
</div>
<!-- Login Form -->
<form class="space-y-lg">
<div class="space-y-unit">
<label class="font-label-md text-label-md text-on-surface-variant ml-unit" for="email">Email</label>
<input class="w-full h-14 px-md rounded-lg bg-surface-container-low border border-outline-variant focus:border-primary-container focus:ring-1 focus:ring-primary-container outline-none transition-all font-body-md text-on-surface" id="email" placeholder="ritual@artisanbrew.com" type="email"/>
</div>
<div class="space-y-unit">
<div class="flex justify-between items-center ml-unit">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:underline" href="#">Forgot Password?</a>
</div>
<div class="relative">
<input class="w-full h-14 px-md rounded-lg bg-surface-container-low border border-outline-variant focus:border-primary-container focus:ring-1 focus:ring-primary-container outline-none transition-all font-body-md text-on-surface" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-outline" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Primary Action -->
<button class="w-full h-[56px] bg-primary-container text-on-primary rounded-full font-label-md text-body-lg shadow-sm hover:opacity-90 transition-opacity active:scale-[0.98] duration-200" type="submit">
                    Sign In
                </button>
</form>

<div class="flex-grow border-t border-outline-variant/50"></div>
<span class="px-md font-label-sm text-label-sm text-outline uppercase tracking-widest">or continue with</span>
<div class="flex-grow border-t border-outline-variant/50"></div>
</div>
