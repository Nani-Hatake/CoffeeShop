

<main class="flex-1   px-margin-mobile py-lg max-w-2xl mx-auto w-full">
<!-- Section Header -->
<div class="mb-lg">
<h2 class="font-headline-lg text-headline-lg text-primary mb-xs">Gifting Ritual</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Personalize your gift with a thoughtful message for a fellow coffee lover.</p>
</div>
<!-- Bento Layout for Preview and Form -->
<div class="grid grid-cols-1 gap-lg">
<!-- Gift Card Preview (High-end Card) -->
<div class="relative overflow-hidden rounded-xl bg-surface-container-high shadow-[0_4px_12px_rgba(62,39,35,0.08)] border border-outline-variant p-md">
<div class="absolute top-0 right-0 w-32 h-32 bg-primary/5 rounded-full -mr-16 -mt-16 blur-3xl"></div>
<div class="relative flex flex-col gap-md">
<div class="flex justify-between items-start">
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest">Premium Gift Card</span>
<div class="p-2 bg-primary-container rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary text-[20px]" data-weight="fill">card_giftcard</span>
</div>
</div>
<div class="aspect-[1.6/1] w-full rounded-lg overflow-hidden shadow-md">
<div class="h-full w-full relative bg-primary flex flex-col justify-end p-lg">
<img class="absolute inset-0 w-full h-full object-cover opacity-60" data-alt="close-up of microfoam art on a latte in a dark ceramic cup, dramatic lighting, moody espresso tones" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC9IBow5cww13337ZOHAJxV0mbSzNrBwEfBuj79Z0WZn2BiXjKl9LhD-JSCkxi99BTkGk8i94SPCuSNUAssPwM1ocMZ4KqBDtpiuvz5JHLTmodCzo90SzOWDkuhdjulYIvZdXghYdzvluVSlu57XOzlz5xos7_rQ4K4__HMwC-cOEINxOZrjf7axuK5r5rjmT_ZHjgiMaklfyejcjxmOiG_tXf3Jp0yfvze-_oBkAcI_dLRdoap-R7F2hangCzxRR7Uq_CwiK1i3qM"/>
<div class="absolute inset-0 bg-gradient-to-t from-primary/80 to-transparent"></div>
<div class="relative z-10">
<p class="font-serif text-on-primary text-xl tracking-wide mb-1">Artisan Brew Choice</p>
<p class="font-sans text-on-primary/70 text-xs tracking-[0.2em] uppercase">Valid at all Ritual Locations</p>
</div>
</div>
</div>
<div class="flex flex-col gap-xs pt-xs">
<p class="font-label-sm text-label-sm text-outline">RECIPIENT</p>
<p class="font-headline-md text-headline-md text-primary" id="preview-name">The Coffee Enthusiast</p>
</div>
</div>
</div>
<!-- Personalized Form -->
<div class="bg-surface-container-low rounded-xl p-lg border border-outline-variant/30 flex flex-col gap-lg">
<!-- Recipient Name -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="recipient-name">Recipient Name</label>
<input class="h-[56px] px-md rounded-lg bg-surface border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none font-sans text-body-md transition-all" id="recipient-name" placeholder="Who are we brewing for?" type="text"/>
</div>
<!-- Recipient Email -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="recipient-email">Email Address</label>
<input class="h-[56px] px-md rounded-lg bg-surface border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none font-sans text-body-md transition-all" id="recipient-email" placeholder="example@ritual.com" type="email"/>
</div>
<!-- Personal Note -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="personal-note">Personal Note</label>
<textarea class="p-md rounded-lg bg-surface border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none font-sans text-body-md transition-all resize-none" id="personal-note" placeholder="May your mornings be as rich and dark as this roast..." rows="4"></textarea>
</div>
</div>
<!-- Complete Action Button -->
<button class="h-[56px] w-full bg-primary-container text-on-primary rounded-full font-label-md text-label-md uppercase tracking-widest shadow-lg active:scale-[0.98] transition-transform flex items-center justify-center gap-sm">
                Complete Gift
                <span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
</div>
</main>

<!-- Floating Action Background Decorative Element -->
<div class="fixed top-1/4 -left-20 w-64 h-64 bg-surface-variant/20 rounded-full blur-3xl pointer-events-none -z-10"></div>
<div class="fixed bottom-1/4 -right-20 w-64 h-64 bg-primary/5 rounded-full blur-3xl pointer-events-none -z-10"></div>
