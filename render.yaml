services:
  - type: web
    name: coffee-backend
    runtime: python
    plan: free   # 👈 ADD THIS LINE
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
