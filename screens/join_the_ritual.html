<h1 class="font-display-lg text-surface leading-tight">Elevate your daily experience.</h1>
</div>
</section>
<!-- Form Section -->
<section class="lg:w-1/2 flex items-center justify-center px-margin-mobile py-xl lg:py-0 bg-surface">
<div class="w-full max-w-[440px]">
<div class="mb-xl">

<p class="font-body-md text-on-surface-variant">Create an account to begin your journey through curated artisanal blends.</p>
</div>
<form class="space-y-lg">
<!-- Full Name -->
<div class="space-y-xs">
<label class="font-label-md text-on-surface ml-1" for="name">Full Name</label>
<input class="w-full h-14 px-md bg-surface-container-low border border-outline-variant rounded-lg font-body-md text-on-surface placeholder:text-outline/50 form-input-focus transition-all" id="name" placeholder="Arthur Brew" type="text"/>
</div>
<!-- Email -->
<div class="space-y-xs">
<label class="font-label-md text-on-surface ml-1" for="email">Email Address</label>
<input class="w-full h-14 px-md bg-surface-container-low border border-outline-variant rounded-lg font-body-md text-on-surface placeholder:text-outline/50 form-input-focus transition-all" id="email" placeholder="name@ritual.com" type="email"/>
</div>
<!-- Password -->
<div class="space-y-xs relative">
<label class="font-label-md text-on-surface ml-1" for="password">Secure Password</label>
<div class="relative">
<input class="w-full h-14 px-md bg-surface-container-low border border-outline-variant rounded-lg font-body-md text-on-surface placeholder:text-outline/50 form-input-focus transition-all" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-outline" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start space-x-md py-xs">
<div class="flex items-center h-6">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary-container bg-surface-container-low" id="terms" type="checkbox"/>
</div>
<label class="font-body-md text-on-surface-variant text-[14px] leading-tight" for="terms">
                            I agree to the <a class="text-primary font-semibold underline underline-offset-4 decoration-outline-variant" href="#">Terms of Service</a> and <a class="text-primary font-semibold underline underline-offset-4 decoration-outline-variant" href="#">Privacy Policy</a>.
                        </label>
</div>
<!-- CTA Button -->
<button class="w-full h-[56px] bg-primary text-on-primary rounded-full font-label-md text-[16px] uppercase tracking-widest shadow-lg hover:bg-primary-container transition-all active:scale-[0.98] mt-md" type="submit">
                        Create Account
                    </button>
